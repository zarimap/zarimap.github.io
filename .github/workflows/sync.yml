name: Copy files to another repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  copy-to-another-repo:
    runs-on: ubuntu-latest
    steps:
      # 1. コピー元のファイルをチェックアウト
      - name: Checkout source repository
        uses: actions/checkout@v4

      # 2. トークンを使って zaritsuri.com に強制上書きコピー
      - name: Pushes to another repository
        uses: s0/git-publish-subdir-action@v2.6.0
        env:
          # 今お使いのトークンをそのまま使えます
          # 💡 URLの部分（zarimap/zaritsuri.com）が合っているか念のため確認してください
          REPO: https://x-access-token:${{ secrets.API_TOKEN_GITHUB }}@github.com/zarimap/zaritsuri.com.git
          BRANCH: main
          FOLDER: .
          
          # コピー先の main ブランチにあるファイルを一度すべて削除する設定
          CLEAR_GLOBS: '*'
          
          # すでに main ブランチが存在しても、強制的に上書き（Force Push）する設定
          FORCE_TO_BRANCH: true
