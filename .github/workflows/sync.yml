name: Copy files to another repository

on:
  # mainブランチへのプッシュ（またはデプロイ）をトリガーにする場合
  push:
    branches:
      - main
  # 手動で実行したい場合（テスト用）
  workflow_dispatch:

jobs:
  copy-to-another-repo:
    runs-on: ubuntu-latest
    steps:
      # 1. コピー元のリポジトリのコードをチェックアウト
      - name: Checkout source repository
        uses: actions/checkout@v4

      # 2. 外部のアクションを使って、特定のフォルダやファイルをもう一方のリポジトリにコピー
      - name: Pushes to another repository
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          # ステップ2で設定したシークレットトークン
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          # コピーしたいファイルやフォルダのパス（リポジトリ全体なら「.」）
          source_file: '.' 
          
          # コピー先（ターゲット）のユーザー名とリポジトリ名
          destination_repo: 'zarimap/zaritsuri.com'
          
          # コピー先の対象ブランチ（例: main または gh-pages）
          destination_folder: 'main' # コピー先のルートに置く場合は空欄
          user_email: 'github-actions[bot]@users.noreply.github.com'
          user_name: 'github-actions[bot]'
          commit_message: 'Auto-updated from source repository via GitHub Actions'
