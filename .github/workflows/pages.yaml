name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # あなたのデフォルトブランチ名（mainかmaster）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. GitHub Pages用の設定を初期化（Jekyllは起動しません）
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 2. リポジトリのファイル（HTML等）をそのままアーティファクトとしてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # index.htmlがある場所（ルートなら '.'）

      # 3. デプロイ（公開）実行
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
