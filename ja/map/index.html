<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarimap - ザリガニ検索マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <style>
        /* 地図の上にボタンを浮かせるためのスタイル */
        #map-container {
            position: relative;
            flex: 1; /* 親のmain-containerがFlexboxの場合、画面いっぱいに広げる */
            min-height: 400px; /* 必要に応じて調整 */
        }

        #map {
            height: 100%; /* containerいっぱいに広げる */
            width: 100%;
        }

        .map-floating-btn {
            position: absolute;
            bottom: 20px;   /* 下から20px */
            right: 20px;    /* 右から20px */
            z-index: 1000;  /* Leafletより手前に表示 */
            
            padding: 12px 20px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .map-floating-btn:hover {
            background-color: #d35400;
            transform: scale(1.05);
        }

        .map-floating-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>
                <a href="../../index.html" style="color: inherit; text-decoration: none;">
                    ザリマップ <span class="subtitle">ザリガニの目撃情報を共有</span>
                </a>
            </h1>            
            <nav class="header-nav">
                <ul>
                    <li><a href="../../index.html">ホーム</a></li>
                    <li><a href="../details/post/index.html">情報投稿</a></li>
                    <li><a href="https://sites.google.com/view/dzt/" target="_blank" rel="noopener noreferrer">公式サイト</a></li>
                    <li class="pc-only"><a href="../../README.md">About</a></li>
                    <li><a href="../../en/map/index.html">English</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="main-container">
        <!-- 地図を浮かせるボタンと一緒にラップする -->
        <div id="map-container">
            <div id="map"></div>
            
            <!-- マップ内に浮かせるボタン -->
            <button type="button" id="locate-btn" class="map-floating-btn">
                🔍 近くのザリガニを探す
            </button>
        </div>

        <div id="data-panel">
            <div id="info-content">
                <h3>読み込み中...</h3>
                <p>マップを動かして、近くの生息地を探してみましょう。</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>const currentLang = 'ja';</script>
    <script src="../../assets/js/map-logic.js"></script>
</body>
</html>
