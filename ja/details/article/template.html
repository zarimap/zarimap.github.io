<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スポット詳細 - ザリマップ</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <style>
        .detail-hero {
            width: 100%; height: 300px;
            background-color: #ddd;
            background-size: cover; background-position: center;
            border-radius: 12px; margin-bottom: 20px;
        }
        .detail-card {
            background: white; padding: 25px;
            border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .category-tag {
            display: inline-block; background: #e67e22; color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px;
        }
        .detail-title {
            font-size: 1.8rem; color: #2c3e50; margin: 0 0 15px 0;
            border-left: 5px solid #e67e22; padding-left: 15px;
        }
        .info-grid {
            display: grid; grid-template-columns: 100px 1fr;
            gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;
        }
        .info-label { font-weight: bold; color: #7f8c8d; }
        .back-link { display: inline-block; margin-top: 20px; color: #e67e22; text-decoration: none; font-weight: bold; }
        .back-link:before { content: "← "; }
        html, body { height: auto !important; overflow: visible !important; }
        
        /* 読み込み中の表示 */
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <h1><a href="../../index.html" style="color: inherit; text-decoration: none;">ザリマップ <span class="subtitle">詳細情報</span></a></h1>
            <nav class="header-nav">
                <ul>
                    <li><a href="../../index.html">マップに戻る</a></li>
                    <li><a href="../post/index.html">情報を投稿</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container" style="display: block; padding: 20px; max-width: 800px; margin: 0 auto;">
        <div id="loading">情報を読み込み中...</div>
        
        <div id="content" style="display: none;">
            <a href="../../ja/map/index.html" class="back-link">マップへ戻る</a>

            <article class="detail-card">
                <div class="detail-hero" id="hero-img"></div>
                <span class="category-tag">生息地情報</span>
                <h2 class="detail-title" id="disp-name">---</h2>
                <p class="detail-description" id="disp-desc" style="line-height: 1.8; color: #34495e; white-space: pre-wrap;"></p>

                <div class="info-grid">
                    <div class="info-label">住所</div>
                    <div class="info-value" id="disp-address">---</div>
                    <div class="info-label">確認時期</div>
                    <div class="info-value" id="disp-period">---</div>
                    <div class="info-label">種類</div>
                    <div class="info-value" id="disp-type">---</div>
                </div>
            </article>

            <section class="detail-card">
                <h3 style="margin-top: 0;">現地写真</h3>
                <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;" id="photo-list">
                    <p style="color: #ccc;">写真はまだありません</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        // URLの ?id=0 を取得
        const urlParams = new URLSearchParams(window.location.search);
        const spotId = parseInt(urlParams.get('id')) || 0;

        // CSVの読み込み
        fetch('../../../assets/data/zarigani.csv')
            .then(res => res.text())
            .then(csvData => {
                const rows = csvData.trim().split('\n');
                // ヘッダーを除いたデータ行を取得
                const data = rows.slice(1).map(row => row.split(','));

                if (data[spotId]) {
                    const target = data[spotId];
                    
                    // HTML要素に流し込む
                    document.getElementById('disp-name').innerText = target[0];
                    document.getElementById('disp-desc').innerText = target[1]; // 日本語
                    document.getElementById('disp-address').innerText = target[3];
                    document.getElementById('disp-period').innerText = target[4];
                    document.getElementById('disp-type').innerText = target[5];
                    
                    // タイトルを場所の名前に変更
                    document.title = target[0] + " - ザリマップ";

                    // 読み込み完了後の表示切り替え
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "データが見つかりませんでした。";
                }
            })
            .catch(err => {
                document.getElementById('loading').innerText = "エラーが発生しました。";
                console.error(err);
            });
    </script>

    <footer style="text-align: center; padding: 40px 0; color: #95a5a6; font-size: 0.9rem;">
        &copy; 2026 Zarimap Project
    </footer>
</body>
</html>
