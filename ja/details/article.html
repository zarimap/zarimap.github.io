<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スポット詳細 - ザリマップ</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .detail-hero {
            width: 100%; height: 300px;
            background-color: #ddd;
            background-size: cover; background-position: center;
            border-radius: 12px; margin-bottom: 20px;
            display: none; /* 最初は非表示 */
        }
        .detail-card {
            background: white; padding: 25px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .category-tag {
            display: inline-block; background: #e67e22; color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px;
        }
        .detail-title {
            font-size: 1.8rem; color: #2c3e50; margin: 0 0 15px 0;
            border-left: 5px solid #e67e22; padding-left: 15px;
        }
        .info-grid {
            display: grid; grid-template-columns: 100px 1fr;
            gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;
        }
        .info-label { font-weight: bold; color: #7f8c8d; }
        .back-link { display: inline-block; margin-top: 20px; color: #e67e22; text-decoration: none; font-weight: bold; }
        .back-link:before { content: "← "; }
        html, body { height: auto !important; overflow: visible !important; }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <h1><a href="../../index.html" style="color: inherit; text-decoration: none;">ザリマップ <span class="subtitle">詳細情報</span></a></h1>
            <nav class="header-nav">
                <ul>
                    <li><a href="../map/index.html">マップに戻る</a></li>
                    <li><a href="post/index.html">情報を投稿</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container" style="display: block; padding: 20px; max-width: 800px; margin: 0 auto;">
        <div id="loading">情報を読み込み中...</div>
        
        <div id="content" style="display: none;">
            <a href="../map/index.html" class="back-link">マップへ戻る</a>

            <article class="detail-card">
                <img id="display-photo" src="" class="detail-hero" alt="現地の写真">
                
                <span class="category-tag">生息地情報</span>
                <h2 class="detail-title" id="disp-name">---</h2>
                <p class="detail-description" id="disp-desc" style="line-height: 1.8; color: #34495e; white-space: pre-wrap;"></p>

                <div class="info-grid">
                    <div class="info-label">住所</div>
                    <div class="info-value" id="disp-address">---</div>
                    <div class="info-label">確認時期</div>
                    <div class="info-value" id="disp-period">---</div>
                    <div class="info-label">種類</div>
                    <div class="info-value" id="disp-type">---</div>
                </div>
                <!-- 地図表示エリア -->
                <div style="margin-top: 20px;">
                    <iframe
                        id="disp-map"
                        width="100%"
                        height="300"
                        style="border:0; border-radius: 12px;"
                        loading="lazy"
                        allowfullscreen
                        referrerpolicy="no-referrer-when-downgrade"
                        src="">
                    </iframe>
                </div>
            </article>
        </div>
    </main>

    <script>
        // URLの ?id=0 を取得
        const urlParams = new URLSearchParams(window.location.search);
        const spotId = parseInt(urlParams.get('id'));

        // IDが数値でない場合は0にする
        const targetId = isNaN(spotId) ? 0 : spotId;

        // CSVの読み込み
        fetch('../../assets/data/zarigani.csv')
            .then(res => {
                if (!res.ok) throw new Error('CSVファイルが見つかりません');
                return res.text();
            })
            .then(csvData => {
                const rows = csvData.trim().split('\n');
                // カンマ区切りでパース（単純なカンマ区切りの場合）
                const data = rows.slice(1).map(row => row.split(','));

                if (data[targetId]) {
                    const target = data[targetId];
                    
                    // HTML要素に流し込む
                    document.getElementById('disp-name').innerText = target[0] || "名称なし";
                    document.getElementById('disp-desc').innerText = target[4] || "説明はありません。";
                    document.getElementById('disp-address').innerText = target[8] || "不明";
                    document.getElementById('disp-period').innerText = target[9] || "不明";
                    document.getElementById('disp-type').innerText = target[10] || "不明";
                    
                    // --- Googleマップの埋め込み処理 ---
                    const address = target[8]; // 住所がCSVの9列目(index:8)にある場合
                    const mapIframe = document.getElementById('disp-map');
                    if (address && address !== "不明") {
                        // 住所をURLエンコードして埋め込みURLを作成
                        const mapUrl = `https://www.google.com/maps?output=embed&q=${encodeURIComponent(address)}&z=15`;
                        mapIframe.src = mapUrl;
                        mapIframe.style.display = 'block';
                    } else {
                        mapIframe.style.display = 'none'; // 住所がない場合は地図を隠す
                    }

                    // 写真URLの取得（CSVの6列目：インデックス5）
                    const photoUrl = target[5];
                    const imgElement = document.getElementById('display-photo');

                    if (photoUrl && photoUrl.trim().startsWith('http')) {
                        imgElement.src = photoUrl.trim();
                        imgElement.style.display = 'block'; // 写真があれば表示
                    } else {
                        imgElement.style.display = 'none'; // なければ非表示
                    }
                    
                    // ブラウザのタイトルを変更
                    document.title = (target[0] || "スポット詳細") + " - ザリマップ";

                    // 読み込み完了後の表示切り替え
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "データ（ID: " + targetId + "）が見つかりませんでした。";
                }
            })
            .catch(err => {
                document.getElementById('loading').innerText = "エラーが発生しました: " + err.message;
                console.error(err);
            });
    </script>

    <footer style="text-align: center; padding: 40px 0; color: #95a5a6; font-size: 0.9rem;">
        &copy; 2026 Zarimap Project
    </footer>
</body>
</html>
