            margin: 0 auto;

            transition: 0.2s;

        }
        .search-box {
            margin: 10px 0;
            display: flex;
            gap: 5px;
        }
        .search-box input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;

        }
